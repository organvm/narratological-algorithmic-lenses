name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync Python dependencies
        run: uv sync

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Mypy type-check
        run: uv run mypy .

      - name: Run Python test gate
        run: uv run pytest

      - name: Run API smoke tests
        run: uv run python scripts/test_api_smoke.py

      - name: Run MCP smoke tests
        run: uv run python scripts/test_mcp_smoke.py

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Run web tests
        run: npm run web:test

      - name: Run web linter
        run: npm run lint -w packages/web

      - name: Run web typecheck
        run: npm run typecheck -w packages/web

      - name: Build web application
        run: npm run web:build
