[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "pytest-asyncio>=1.4.0",
    "httpx>=0.28.1",
    "ruff>=0.15.18",
    "mypy>=2.1.0",
    "openai>=2.43.0",
]

[tool.uv.workspace]
members = [
    "packages/core",
    "packages/cli",
    "packages/api",
    "packages/mcp",
]

[tool.uv.sources]
narratological = { workspace = true }
narratological-cli = { workspace = true }
narratological-api = { workspace = true }
narratological-mcp = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["packages/*/tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short --import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["narratological", "narratological_cli", "narratological_api"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_return_any = false
warn_unused_ignores = true
explicit_package_bases = true
mypy_path = "packages/core/src:packages/cli/src:packages/api/src:packages/mcp/src"
ignore_missing_imports = true
disallow_any_generics = false
disallow_untyped_defs = false
disallow_untyped_calls = false

[[tool.mypy.overrides]]
module = [
    "tests.*",
    "*.tests.*",
    "scripts.*",
    "narratological.llm.providers",
    "narratological.llm.roles",
    "narratological.generators.coverage",
    "narratological.llm.synthesis",
    "narratological_cli.commands.analyze",
    "narratological.algorithms.executor",
    "narratological_cli.commands.algorithm",
]
ignore_errors = true
